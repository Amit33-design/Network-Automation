services:

  # ── NetDesign AI — FastAPI REST backend ────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NORNIR_WORKERS=${NORNIR_WORKERS:-10}
      - BACKUP_DIR=/app/backups
      - AUDIT_LOG_PATH=/app/backups/audit.jsonl
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - DATABASE_URL=postgresql+asyncpg://netdesign:${POSTGRES_PASSWORD}@postgres/netdesign
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - DEVICE_DEFAULT_USER=${DEVICE_DEFAULT_USER:-admin}
      - DEVICE_DEFAULT_PASS=${DEVICE_DEFAULT_PASS:-}
      - DEMO_MODE=true
      - ZTP_FILES_DIR=/app/ztp_files
    volumes:
      - ./playbooks/inventory:/app/../playbooks/inventory:ro
      - backups:/app/backups
      - ztp_files:/app/ztp_files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"

  # ── ZTP file server (G-A6) — HTTP static mirror of ZTP_FILES_DIR ───────────────
  ztp-files:
    image: nginx:1.27-alpine
    container_name: netdesign-ztp-files
    ports:
      - "8069:80"
    volumes:
      - ztp_files:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── ZTP TFTP server (G-A6) — for devices that boot via plain TFTP ──────────────
  ztp-tftp:
    image: atmoz/tftpd:latest
    container_name: netdesign-ztp-tftp
    ports:
      - "69:69/udp"
    volumes:
      - ztp_files:/var/tftpboot:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── NetDesign AI — MCP SSE server ──────────────────────────────────────────
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-mcp
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command: >
      python mcp_server.py
        --transport sse
        --host 0.0.0.0
        --port 8001
        --log-level INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/sse')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── React frontend (Vite build → Nginx) ─────────────────────────────────────
  # Builds the current React/Vite app in frontend/ and serves the static bundle.
  # (Previously this mounted the legacy vanilla index.html/src — now stale.)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netdesign-frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── PostgreSQL — design/deployment/device persistence ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: netdesign-postgres
    environment:
      POSTGRES_DB:       netdesign
      POSTGRES_USER:     netdesign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "netdesign"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis — job queue + WebSocket pub/sub (Phase 3) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netdesign-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # ── NetDesign AI — Celery async deploy worker (Phase 3) ───────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-worker
    command: >
      celery -A jobs.deploy_job.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=celery
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=postgresql+asyncpg://netdesign:${POSTGRES_PASSWORD}@postgres/netdesign
      - BACKUP_DIR=/app/backups
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - DEVICE_DEFAULT_USER=${DEVICE_DEFAULT_USER:-admin}
      - DEVICE_DEFAULT_PASS=${DEVICE_DEFAULT_PASS:-}
    volumes:
      - ./playbooks/inventory:/app/../playbooks/inventory:ro
      - backups:/app/backups
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"

  # ── HashiCorp Vault — device credential store ──────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: netdesign-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:  ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    restart: unless-stopped

  # ── Prometheus — metrics scraping ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: netdesign-prometheus
    volumes:
      - ./backend/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      - victoriametrics
    restart: unless-stopped

  # ── VictoriaMetrics — long-term TSDB (G-A7) ────────────────────────────────
  # Prometheus remote-writes here; Grafana queries it via the Prometheus API.
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.97.1
    container_name: netdesign-victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=12"   # months
      - "--httpListenAddr=:8428"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Grafana — auto-provisioned dashboards ──────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: netdesign-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-netdesignai}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/network-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./backend/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./backend/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - victoriametrics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
  grafana_data:
  prometheus_data:
  vmdata:
  backups:
  ztp_files:
