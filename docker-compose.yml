version: "3.9"

services:

  # ── NetDesign AI — FastAPI REST backend ────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NORNIR_WORKERS=${NORNIR_WORKERS:-10}
      - BACKUP_DIR=/app/backups
      - AUDIT_LOG_PATH=/app/backups/audit.jsonl
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - DATABASE_URL=postgresql+asyncpg://netdesign:${POSTGRES_PASSWORD}@postgres/netdesign
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - DEVICE_DEFAULT_USER=${DEVICE_DEFAULT_USER:-admin}
      - DEVICE_DEFAULT_PASS=${DEVICE_DEFAULT_PASS:-}
    volumes:
      - ./playbooks/inventory:/app/../playbooks/inventory:ro
      - backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"

  # ── NetDesign AI — MCP SSE server ──────────────────────────────────────────
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-mcp
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command: >
      python mcp_server.py
        --transport sse
        --host 0.0.0.0
        --port 8001
        --log-level INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/sse')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── Static frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: netdesign-frontend
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./preview.svg:/usr/share/nginx/html/preview.svg:ro
      - ./src:/usr/share/nginx/html/src:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── PostgreSQL — design/deployment/device persistence ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: netdesign-postgres
    environment:
      POSTGRES_DB:       netdesign
      POSTGRES_USER:     netdesign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "netdesign"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis — job queue + WebSocket pub/sub (Phase 3) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netdesign-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # ── NetDesign AI — Celery async deploy worker (Phase 3) ───────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-worker
    command: >
      celery -A jobs.deploy_job.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=celery
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=postgresql+asyncpg://netdesign:${POSTGRES_PASSWORD}@postgres/netdesign
      - BACKUP_DIR=/app/backups
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - DEVICE_DEFAULT_USER=${DEVICE_DEFAULT_USER:-admin}
      - DEVICE_DEFAULT_PASS=${DEVICE_DEFAULT_PASS:-}
    volumes:
      - ./playbooks/inventory:/app/../playbooks/inventory:ro
      - backups:/app/backups
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"

  # ── HashiCorp Vault — device credential store ──────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: netdesign-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:  ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    restart: unless-stopped

  # ── Prometheus — metrics scraping (Phase 4) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: netdesign-prometheus
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    profiles:
      - observability

  # ── Grafana — dashboards (Phase 4) ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: netdesign-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-netdesign}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./ops/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - observability

volumes:
  pgdata:
  redisdata:
  grafanadata:
  backups:
