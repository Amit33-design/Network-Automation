version: "3.9"

services:

  # ── NetDesign AI — FastAPI REST backend ────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NORNIR_WORKERS=${NORNIR_WORKERS:-10}
      - BACKUP_DIR=/tmp/netdesign_backups
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    env_file:
      - ./backend/.env          # create from backend/.env.example
    volumes:
      - ./playbooks/inventory:/app/../playbooks/inventory:ro
      - backups:/tmp/netdesign_backups
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── NetDesign AI — MCP SSE server (for ChatGPT / remote AI clients) ────────
  # Connect from Claude Desktop or ChatGPT Custom GPT at:
  #   http://localhost:8001/sse
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdesign-mcp
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command: >
      python mcp_server.py
        --transport sse
        --host 0.0.0.0
        --port 8001
        --log-level INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/sse')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── Static frontend (optional — or just open index.html directly) ──────────
  frontend:
    image: nginx:alpine
    container_name: netdesign-frontend
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./preview.svg:/usr/share/nginx/html/preview.svg:ro
      - ./src:/usr/share/nginx/html/src:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  backups:
