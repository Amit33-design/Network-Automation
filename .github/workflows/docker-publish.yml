name: Build & Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"          # triggers on v1.0.0, v2.4.1, etc.
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. v2.4.0)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase — use built-in toLower
  API_IMAGE: ghcr.io/amit33-design/network-automation/api
  FRONTEND_IMAGE: ghcr.io/amit33-design/network-automation/frontend

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "latest=true" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
            echo "latest=false" >> $GITHUB_OUTPUT
          fi

      # ── API image ─────────────────────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.latest == 'true' && format('{0}:latest', env.API_IMAGE) || '' }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}

      # ── Frontend image ────────────────────────────────────────────────────────
      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.latest == 'true' && format('{0}:latest', env.FRONTEND_IMAGE) || '' }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.version.outputs.latest == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docker-compose.dist.yml
            install.sh
            install.bat
            .env.example
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
