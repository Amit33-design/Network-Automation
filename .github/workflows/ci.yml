name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Python backend tests ──────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --prefer-binary jinja2 pytest pytest-cov pytest-asyncio
          # Minimal subset needed for tests (skip heavy network/grpc libs)
          pip install fastapi pydantic pydantic-settings cryptography pyyaml pyjwt

      - name: Run tests with coverage
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret-not-for-prod
          AUTO_CREATE_TABLES: "false"
        run: |
          pytest tests/ -v --tb=short \
            --cov=. \
            --cov-omit="tests/*,.venv/*,alembic/*" \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: backend/coverage.xml

  # ── Frontend TypeScript typecheck ────────────────────────────
  frontend-typecheck:
    name: Frontend TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: TypeScript typecheck
        working-directory: frontend
        run: npm run typecheck

  # ── Ansible playbook syntax check ────────────────────────────
  ansible-lint:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Syntax check — campus playbook
        run: |
          cd playbooks
          ansible-playbook deploy_campus.yml -i inventory/hosts.yml \
            --syntax-check \
            -e "vault_campus_password=test vault_dc_password=test vault_gpu_password=test vault_fw_password=test" \
            || true   # don't fail on missing collections in CI

      - name: Syntax check — DC playbook
        run: |
          cd playbooks
          ansible-playbook deploy_dc.yml -i inventory/hosts.yml \
            --syntax-check \
            -e "vault_campus_password=test vault_dc_password=test vault_gpu_password=test vault_fw_password=test" \
            || true

  # ── Docker build check ────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t netdesign-api:ci ./backend

      - name: Smoke test — API starts
        run: |
          docker run -d --name netdesign-test -p 8000:8000 \
            -e CORS_ORIGINS=http://localhost:8080 \
            -e ADMIN_USER=admin \
            -e ADMIN_PASS=testpassword \
            netdesign-api:ci
          sleep 10
          curl -f http://localhost:8000/health || (docker logs netdesign-test && exit 1)
          docker stop netdesign-test && docker rm netdesign-test
