---
# NetDesign AI — Ansible Inventory
# Replace IPs and credentials with real device values.
# Encrypt passwords with: ansible-vault encrypt_string 'secret' --name 'ansible_password'

all:
  vars:
    ansible_connection: network_cli
    ansible_user: admin

  children:

    # ── Campus ─────────────────────────────────────
    campus:
      children:

        campus_access:
          hosts:
            ACC-01:
              ansible_host: 10.100.1.11
              ansible_network_os: ios
              ansible_password: "{{ vault_campus_password }}"
            ACC-02:
              ansible_host: 10.100.1.12
              ansible_network_os: ios
              ansible_password: "{{ vault_campus_password }}"

        campus_dist:
          hosts:
            DIST-01:
              ansible_host: 10.100.1.21
              ansible_network_os: ios
              ansible_password: "{{ vault_campus_password }}"
            DIST-02:
              ansible_host: 10.100.1.22
              ansible_network_os: ios
              ansible_password: "{{ vault_campus_password }}"

        campus_core:
          hosts:
            CORE-01:
              ansible_host: 10.100.1.31
              ansible_network_os: ios
              ansible_password: "{{ vault_campus_password }}"

    # ── Data Center ────────────────────────────────
    datacenter:
      children:

        dc_spine:
          hosts:
            SPINE-01:
              ansible_host: 10.100.2.11
              ansible_network_os: nxos
              ansible_password: "{{ vault_dc_password }}"
            SPINE-02:
              ansible_host: 10.100.2.12
              ansible_network_os: nxos
              ansible_password: "{{ vault_dc_password }}"

        dc_leaf:
          hosts:
            LEAF-01:
              ansible_host: 10.100.2.21
              ansible_network_os: nxos
              ansible_password: "{{ vault_dc_password }}"
            LEAF-02:
              ansible_host: 10.100.2.22
              ansible_network_os: nxos
              ansible_password: "{{ vault_dc_password }}"
            LEAF-03:
              ansible_host: 10.100.2.23
              ansible_network_os: nxos
              ansible_password: "{{ vault_dc_password }}"
            LEAF-04:
              ansible_host: 10.100.2.24
              ansible_network_os: nxos
              ansible_password: "{{ vault_dc_password }}"

    # ── GPU / AI Cluster ───────────────────────────
    gpu_cluster:
      children:

        gpu_spine:
          hosts:
            GPU-SPINE-01:
              ansible_host: 10.100.3.11
              ansible_network_os: eos
              ansible_password: "{{ vault_gpu_password }}"
            GPU-SPINE-02:
              ansible_host: 10.100.3.12
              ansible_network_os: eos
              ansible_password: "{{ vault_gpu_password }}"

        gpu_tor:
          hosts:
            GPU-TOR-01:
              ansible_host: 10.100.3.21
              ansible_network_os: sonic
              ansible_password: "{{ vault_gpu_password }}"
            GPU-TOR-02:
              ansible_host: 10.100.3.22
              ansible_network_os: sonic
              ansible_password: "{{ vault_gpu_password }}"
            GPU-TOR-03:
              ansible_host: 10.100.3.23
              ansible_network_os: sonic
              ansible_password: "{{ vault_gpu_password }}"
            GPU-TOR-04:
              ansible_host: 10.100.3.24
              ansible_network_os: sonic
              ansible_password: "{{ vault_gpu_password }}"

    # ── Firewalls ──────────────────────────────────
    firewalls:
      hosts:
        FW-01:
          ansible_host: 10.100.0.1
          ansible_network_os: panos
          ansible_password: "{{ vault_fw_password }}"
        FW-02:
          ansible_host: 10.100.0.2
          ansible_network_os: panos
          ansible_password: "{{ vault_fw_password }}"
