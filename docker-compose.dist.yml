# NetDesign AI — Production Distribution Compose
# ─────────────────────────────────────────────────────────────────────────────
# Quick start:
#   curl -fsSL https://raw.githubusercontent.com/Amit33-design/Network-Automation/main/install.sh | bash
#
# Or manually:
#   cp .env.example .env      # fill in secrets
#   docker compose -f docker-compose.dist.yml up -d
#
# Web UI:  http://localhost:8080
# API:     http://localhost:8000/docs
# MCP SSE: http://localhost:8001/sse
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API backend ──────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/amit33-design/network-automation/api:${NETDESIGN_VERSION:-latest}
    container_name: netdesign-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      LOG_LEVEL:          ${LOG_LEVEL:-INFO}
      NORNIR_WORKERS:     ${NORNIR_WORKERS:-10}
      BACKUP_DIR:         /app/backups
      AUDIT_LOG_PATH:     /app/backups/audit.jsonl
      CORS_ORIGINS:       ${CORS_ORIGINS:-http://localhost:8080}
      JWT_SECRET:         ${JWT_SECRET}
      ADMIN_USER:         ${ADMIN_USER:-admin}
      ADMIN_PASS:         ${ADMIN_PASS}
      LICENSE_KEY:        ${LICENSE_KEY:-}
      DATABASE_URL:       postgresql+asyncpg://netdesign:${POSTGRES_PASSWORD}@postgres/netdesign
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379
      VAULT_ADDR:         http://vault:8200
      VAULT_TOKEN:        ${VAULT_TOKEN}
      DEVICE_DEFAULT_USER: ${DEVICE_DEFAULT_USER:-admin}
      DEVICE_DEFAULT_PASS: ${DEVICE_DEFAULT_PASS:-}
      AUTO_CREATE_TABLES: "true"
    volumes:
      - backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: { memory: 2g, cpus: "2" }

  # ── MCP SSE server ────────────────────────────────────────────────────────────
  mcp:
    image: ghcr.io/amit33-design/network-automation/api:${NETDESIGN_VERSION:-latest}
    container_name: netdesign-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    command: >
      python mcp_server.py --transport sse --host 0.0.0.0 --port 8001 --log-level INFO
    environment:
      PYTHONPATH:      /app
      PYTHONUNBUFFERED: "1"
      LICENSE_KEY:     ${LICENSE_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/sse"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Celery async worker ────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/amit33-design/network-automation/api:${NETDESIGN_VERSION:-latest}
    container_name: netdesign-worker
    restart: unless-stopped
    command: >
      celery -A jobs.deploy_job.celery_app worker --loglevel=info --concurrency=4
    environment:
      PYTHONPATH:          /app
      PYTHONUNBUFFERED:    "1"
      REDIS_URL:           redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL:        postgresql+asyncpg://netdesign:${POSTGRES_PASSWORD}@postgres/netdesign
      BACKUP_DIR:          /app/backups
      VAULT_ADDR:          http://vault:8200
      VAULT_TOKEN:         ${VAULT_TOKEN}
      DEVICE_DEFAULT_USER: ${DEVICE_DEFAULT_USER:-admin}
      DEVICE_DEFAULT_PASS: ${DEVICE_DEFAULT_PASS:-}
      LICENSE_KEY:         ${LICENSE_KEY:-}
    volumes:
      - backups:/app/backups
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits: { memory: 2g, cpus: "2" }

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/amit33-design/network-automation/frontend:${NETDESIGN_VERSION:-latest}
    container_name: netdesign-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: netdesign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       netdesign
      POSTGRES_USER:     netdesign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "netdesign"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512m }

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netdesign-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits: { memory: 256m }

  # ── HashiCorp Vault ───────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: netdesign-vault
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:  ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "127.0.0.1:8200:8200"

  # ── Prometheus + Grafana (opt-in) ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: netdesign-prometheus
    restart: unless-stopped
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    profiles: [observability]

  grafana:
    image: grafana/grafana:11.0.0
    container_name: netdesign-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-netdesign}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./ops/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on: [prometheus]
    profiles: [observability]

volumes:
  pgdata:
  redisdata:
  grafanadata:
  backups:
