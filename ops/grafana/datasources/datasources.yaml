apiVersion: 1

# G-A7: auto-provisioned datasources for the production (dist) Grafana.
# Mounted into the observability-profile grafana service.
datasources:
  - name: NetDesign Prometheus
    type: prometheus
    uid: netdesign-prometheus
    url: http://prometheus:9090
    isDefault: true
    access: proxy
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # VictoriaMetrics — long-term TSDB, Prometheus query-API compatible.
  - name: NetDesign VictoriaMetrics
    type: prometheus
    uid: netdesign-victoriametrics
    url: http://victoriametrics:8428
    isDefault: false
    access: proxy
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
